server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: eventsphere-backend

  datasource:
    url: jdbc:mysql://localhost:3306/eventsphere?useSSL=false&serverTimezone=UTC
    username: eventsphere_user
    password: eventsphere_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

jwt:
  secret: ${JWT_SECRET:change-this-in-local-env-file}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
